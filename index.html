<!DOCTYPE html>
<html lang="ko">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f1f5f9;-webkit-font-smoothing:antialiased;}
input,select,button,td,th,div,span,p,h1,h2,label{font-family:'Noto Sans KR',sans-serif !important;}
input[type=number]::-webkit-inner-spin-button{opacity:0.5;}

/* ── 인쇄 ── */
@media print{
  @page{
    size:A4 portrait;
    margin:14mm 12mm 22mm 14mm;
    @bottom-right{
      content:"MANMIN-Ver3.3";
      font-family:'Orbitron',sans-serif;
      font-size:8pt;
      font-weight:700;
      color:#9ca3af;
      letter-spacing:0.08em;
    }
  }
  body{background:white !important;}
  #no-print{display:none !important;}
  .no-print{display:none !important;}
  #report-zone{box-shadow:none !important;border:none !important;padding:0 !important;margin:0 !important;border-radius:0 !important;}
  .page-break{page-break-before:always;}
  .print-section{break-inside:avoid;page-break-inside:avoid;}
  #dev-stamp{display:none !important;}
}
/* 화면 전용: 문서 흐름 내 우측 정렬, 겹침 없음 */
#dev-stamp{
  display:block;
  text-align:right;
  font-size:10px;
  color:#9ca3af;
  letter-spacing:0.05em;
  padding-top:14px;
  font-family:'Noto Sans KR',sans-serif;
}

/* ── 반응형 그리드 클래스 ── */
.g-proj{display:grid;grid-template-columns:2fr 1fr 1fr;gap:14px;}
.g-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.g-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.g-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.g-2sm{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.g-pump{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.g-motor{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.tbl-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:6px;}
.tbl-wrap::-webkit-scrollbar{height:5px;}
.tbl-wrap::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px;}
.tab-bar-wrap{display:flex;gap:4px;padding-top:4px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.tab-bar-wrap::-webkit-scrollbar{display:none;}
.hdr-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;}
.sum-bar{display:flex;flex-wrap:wrap;gap:14px;}
/* 계산식 안내 floating button */
.formula-fab{
  position:fixed;bottom:80px;right:16px;z-index:1000;
  background:linear-gradient(135deg,#450a0a,#991b1b,#b91c1c);
  color:white;border:none;border-radius:14px;
  padding:10px 14px;font-size:11px;font-weight:800;
  cursor:pointer;box-shadow:0 4px 18px rgba(153,27,27,0.50);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  line-height:1.3;gap:2px;font-family:'Noto Sans KR',sans-serif;
  transition:transform 0.15s,box-shadow 0.15s;
}
.formula-fab:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(153,27,27,0.68);}

/* ══ PWA 설치 FAB ══ */
.pwa-install-fab{
  position:fixed;bottom:18px;right:18px;z-index:1100;
  background:linear-gradient(135deg,#DC2626 0%,#991B1B 100%);
  color:white;border:none;border-radius:14px;
  padding:10px 14px;cursor:pointer;
  box-shadow:0 4px 20px rgba(220,38,38,0.60);
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-family:'Noto Sans KR',sans-serif;line-height:1.3;
  transition:transform 0.15s,box-shadow 0.15s;
  animation:pwaFabIn 0.55s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
@keyframes pwaFabIn{
  from{opacity:0;transform:scale(0.3) rotate(-25deg);}
  to{opacity:1;transform:scale(1) rotate(0deg);}
}
.pwa-install-fab:hover{transform:translateY(-3px) scale(1.06);box-shadow:0 8px 28px rgba(220,38,38,0.75);}
.pwa-install-fab:active{transform:scale(0.97);}
.pwa-install-fab-badge{
  position:absolute;top:-7px;right:-7px;
  background:#f59e0b;color:#fff;font-size:8px;font-weight:900;
  width:19px;height:19px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  border:2px solid white;
  animation:badgePing 2.2s ease-in-out infinite;
}
@keyframes badgePing{
  0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(245,158,11,0.65);}
  50%{transform:scale(1.2);box-shadow:0 0 0 6px rgba(245,158,11,0);}
}
/* 계산식 안내 모달 */
.fml-overlay{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,0.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;padding:12px;}
.fml-box{position:relative;background:white;border-radius:18px;padding:0;max-width:720px;width:100%;max-height:90vh;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.3);display:flex;flex-direction:column;}
.fml-head{background:linear-gradient(135deg,#450a0a,#991b1b,#b91c1c);color:white;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.fml-body{overflow-y:auto;padding:20px 22px;-webkit-overflow-scrolling:touch;}
.fml-body::-webkit-scrollbar{width:6px;}
.fml-body::-webkit-scrollbar-thumb{background:#fca5a5;border-radius:3px;}
.fml-sec{margin-bottom:22px;}
.fml-sec-title{font-size:12px;font-weight:800;color:#991b1b;text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;display:flex;align-items:center;gap:6px;border-left:3px solid #b91c1c;padding-left:8px;}
.fml-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.fml-eq{font-family:'Noto Sans Mono',monospace;font-size:13px;font-weight:700;color:#7f1d1d;background:#fef2f2;border-radius:6px;padding:6px 10px;margin:6px 0;display:block;word-break:break-all;}
.fml-note{font-size:10px;color:#6b7280;margin-top:4px;line-height:1.7;}
.fml-itabs{display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;flex-shrink:0;background:rgba(0,0,0,.25);}
.fml-itabs::-webkit-scrollbar{display:none;}
.fml-itab{padding:9px 15px;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:11.5px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s;flex-shrink:0;}
.fml-itab:hover:not(.on){color:rgba(255,255,255,.88);}
.fml-itab.on{color:#fff;border-bottom-color:#fca5a5;}
.fml-panel{display:none;}
.fml-panel.on{display:block;}
/* 반응형 브레이크포인트 */
@media(max-width:1024px){
  .g-4{grid-template-columns:repeat(2,1fr);}
  .g-pump{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:768px){
  .g-proj{grid-template-columns:1fr 1fr;}
  .g-2{grid-template-columns:1fr;}
  .g-motor{grid-template-columns:1fr 1fr;}
  .hdr-row .hdr-right{display:none;}
}
@media(max-width:640px){
  .g-proj{grid-template-columns:1fr;}
  .g-4{grid-template-columns:repeat(2,1fr);}
  .g-3{grid-template-columns:repeat(2,1fr);}
  .g-motor{grid-template-columns:1fr 1fr;}
  .hdr-row{flex-direction:column;gap:8px;}
}
@media(max-width:420px){
  .g-4{grid-template-columns:1fr;}
  .g-3{grid-template-columns:1fr;}
  .g-2sm{grid-template-columns:1fr;}
  .g-motor{grid-template-columns:1fr;}
  .g-pump{grid-template-columns:1fr;}
}

/* PWA 설치 배너 */
.pwa-install-banner{
  background:linear-gradient(135deg,#DC2626 0%,#991B1B 100%);
  border:1px solid rgba(255,255,255,0.2);
  animation:slideUp 0.4s ease-out;
}
@keyframes slideUp{
  from{transform:translateY(100%);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

/* ═══ A4 계산서 반응형 미리보기 ═══
   transform-origin:top center 방식으로
   정확한 중앙 배치 + 세로 높이 보정                 */
.rpt-outer{
  width:100%;
  max-width:100%;
  overflow:hidden;
  box-sizing:border-box;
  background:#e8ecf1;
  padding:20px 0;          /* 좌우 패딩 제거 → 중앙 계산 오류 방지 */
  border-radius:14px;
  margin-bottom:16px;
  display:flex;
  justify-content:center;  /* 수평 중앙 정렬 */
  align-items:flex-start;
  /* JS가 height 를 동적 보정 */
}
.rpt-inner{
  width:794px;             /* A4 @ 96dpi */
  max-width:100%;
  box-sizing:border-box;
  flex-shrink:0;
  /* JS: transform-origin:top center; transform:scale(S) */
}
.rpt-hint{
  display:none;
  align-items:center;gap:6px;
  background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;
  padding:8px 13px;font-size:10px;font-weight:600;color:#1e40af;
  margin-bottom:10px;
}
@media(max-width:860px){.rpt-hint{display:flex;}}
@media print{
  .rpt-outer{background:white!important;padding:0!important;overflow:visible!important;border-radius:0!important;margin:0!important;}
  .rpt-inner{transform:none!important;transform-origin:unset!important;width:794px!important;max-width:100%!important;}
  .rpt-hint{display:none!important;}
}

/* ═══ 배관 구간 테이블 모바일 스크롤 힌트 ═══ */
.seg-hint{
  display:none;
  align-items:center;gap:6px;justify-content:center;
  font-size:11px;font-weight:700;color:#6b7280;
  padding:6px 0;
  background:#f8fafc;
  border:1px solid #e2e8f0;border-bottom:none;
  border-radius:6px 6px 0 0;
}
@media(max-width:860px){.seg-hint{display:flex;}}

/* ═══ 입력탭 모바일 반응형 개선 ═══ */
.main-outer{max-width:1300px;margin:0 auto;padding:24px;}
@media(max-width:640px){
  .main-outer{padding:14px 10px 80px;}
  .box-header{padding:9px 14px!important;font-size:11px!important;}
  .box-body{padding:14px 12px!important;}
}
@media(max-width:420px){
  .main-outer{padding:12px 8px 80px;}
}
/* 헤더 모바일 */
@media(max-width:640px){
  .hdr-h1{font-size:18px!important;}
  .hdr-pad{padding:0 14px!important;}
  .sum-item{font-size:11px!important;}
}

/* ── PWA 헤더 설치 버튼 ── */
#pwa-hdr-btn{
  display:none;align-items:center;gap:6px;
  background:linear-gradient(135deg,#f97316,#ea580c);
  color:#fff;border:none;padding:8px 14px;border-radius:8px;
  font-size:12px;font-weight:800;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
  white-space:nowrap;flex-shrink:0;
  transition:all .15s;animation:hdr-pulse 2.2s ease-in-out infinite;
  position:relative;z-index:10;
}
#pwa-hdr-btn.visible{display:flex;}
#pwa-hdr-btn:hover{background:linear-gradient(135deg,#ea580c,#c2410c);transform:translateY(-1px);}
@keyframes hdr-pulse{
  0%,100%{box-shadow:0 2px 8px rgba(249,115,22,.5);}
  50%{box-shadow:0 2px 20px rgba(249,115,22,.85);}
}
@media(max-width:520px){#pwa-hdr-btn .pwa-hdr-txt{display:none;}}
@media print{#pwa-hdr-btn{display:none!important;}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

/* ═══ 상수 ═══════════════════════════════════════════════════ */
const NOZZLE_HEAD      = 17;
const FLOW_PER_HYDRANT = 130;
const WATER_TIME       = 20;

const PIPE_CONFIG = {
  SCH10:{label:"배관용 탄소강관 KS D3507 (백관)",        shortLabel:"KS D3507",       C:120,
         inner:{25:27.6,32:36.2,40:42.1,50:53.2,65:69.0,80:81.0,100:105.3,125:130.1,150:155.5,200:204.6}},
  SCH40:{label:"압력 배관용 탄소강관 KS D 3562 (흑관)",  shortLabel:"KS D3562",       C:120,
         inner:{25:26.6,32:35.1,40:40.9,50:52.5,65:62.7,80:77.9,100:102.3,125:128.2,150:154.1,200:202.7}},
  STS:  {label:"배관용 스테인리스강관 KS D 3595",        shortLabel:"STS(스테인리스)",C:150,
         inner:{25:27.6,32:36.8,40:42.8,50:54.8,65:70.0,80:85.0,100:108.2,125:133.4,150:160.0,200:210.0}},
  CPVC: {label:"내식성 CPVC관 (소방용)",                shortLabel:"CPVC",           C:150,
         inner:{25:26.6,32:35.1,40:40.9,50:52.5,65:62.7,80:79.4,100:101.6,125:127.0,150:154.1,200:203.2}},
};

/* [90°엘보,45°엘보,분류T,직류T,Gate,Ball,Angle,Check] */
const FITTING_EQ={
  25:[0.9,0.54,1.5,0.27,0.18,7.5,4.5,2.0],32:[1.2,0.72,1.8,0.36,0.24,10.5,5.4,2.5],
  40:[1.5,0.90,2.1,0.45,0.30,13.8,6.5,3.1],50:[2.1,1.20,3.0,0.60,0.39,16.5,8.4,4.0],
  65:[2.4,1.30,3.6,0.75,0.48,19.5,10.2,4.6],80:[3.0,1.80,4.5,0.90,0.60,24.0,12.0,5.7],
  100:[4.2,2.40,6.3,1.20,0.81,37.5,16.5,7.6],125:[5.1,3.00,7.5,1.50,0.99,42.0,21.0,10.0],
  150:[6.0,3.60,9.0,1.80,1.20,49.5,24.0,12.0],200:[6.5,3.70,14.0,4.00,1.40,70.0,33.0,15.0],
};

const HOSE_TYPES={
  1:{label:"40mm 아마호스",      rate:26,  fixed:null},
  2:{label:"40mm 고무내장호스",  rate:12,  fixed:null},
  3:{label:"50mm 아마호스",      rate:7,   fixed:null},
  4:{label:"50mm 고무내장호스",  rate:3,   fixed:null},
  5:{label:"25mm 호스릴",        rate:0,   fixed:14},
};
const PUMP_EFF={40:0.40,50:0.45,65:0.55,80:0.55,100:0.60,125:0.65,150:0.70};
const TRANS_TYPE={1:{label:"전동기 직결",k:1.1},2:{label:"전동기 이외의 원동기",k:1.15}};
const PIPE_SIZES=[40,50,65,80,100,125,150,200];
const PUMP_SIZES=[40,50,65,80,100,125,150];
const HP_STEPS=[3,5,7.5,10,15,20,25,30,40,50,60,75,100,125,150,200];

/* ═══ 유틸리티 ══════════════════════════════════════════════ */
function calcFriction(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const Di=cfg.inner[D];if(!Di)return 0;
  return 10.67*Math.pow(Q/60000,1.852)/(Math.pow(cfg.C,1.852)*Math.pow(Di/1000,4.87))*100;
}
function calcVelocity(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const Di=cfg.inner[D];if(!Di)return 0;
  return (Q/60000)/(Math.PI*Math.pow(Di/2000,2));
}
function nextHP(kw){const hp=kw*1.341;for(const h of HP_STEPS){if(h>=hp)return h;}return Math.ceil(hp/5)*5;}

/* 소수점 3자리 반올림 */
function f3(v){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*1000)/1000).toFixed(3);}
function f2(v){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*100)/100).toFixed(2);}
function f1(v){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*10)/10).toFixed(1);}
function ff(v,d=2){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*Math.pow(10,d))/Math.pow(10,d)).toFixed(d);}
const mkSeg=()=>({flow:130,dia:100,len:0,e90:0,e45:0,teeB:0,teeS:0,gate:0,ball:0,angle:0,check:0});

/* ═══ 공통 스타일 토큰 ══════════════════════════════════════ */
const BD="1px solid #d1d5db";
const S={
  border:BD,
  cell:{border:BD,padding:"4px 6px",textAlign:"center",fontFamily:"'Noto Sans KR',sans-serif",fontSize:11},
};

/* 섹션 헤더 공통 스타일 (Ⅱ-1~4 통일) */
const SEC_TITLE_STYLE={
  background:"#1e3a5f",color:"white",padding:"7px 14px",
  fontWeight:800,fontSize:13,borderRadius:"6px 6px 0 0",
  letterSpacing:"0.04em",fontFamily:"'Noto Sans KR',sans-serif",
};

/* ═══ 컴포넌트 ═══════════════════════════════════════════════ */
/* Box — 다크 헤더 바 + 내부 패딩 카드 (01.jpg 스타일) */
function Box({title,accent,children}){
  const bg=accent||"#1e3a5f";
  return(
    <div style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
      <div className="box-header" style={{
        background:`linear-gradient(135deg,${bg} 0%,${bg}ee 100%)`,
        color:"white",padding:"10px 18px",
        fontSize:12,fontWeight:800,letterSpacing:"0.04em",
        display:"flex",alignItems:"center",gap:8,
        fontFamily:"'Noto Sans KR',sans-serif"
      }}>
        <span style={{fontSize:15,opacity:0.85}}>◆</span>{title}
      </div>
      <div className="box-body" style={{padding:"18px 18px"}}>
        {children}
      </div>
    </div>
  );
}
function LabelEl({children}){return <label style={{display:"block",fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>{children}</label>;}
function InpText({val,onChange,placeholder}){return <input type="text" value={val} placeholder={placeholder||""} onChange={e=>onChange(e.target.value)} style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,fontFamily:"'Noto Sans KR',sans-serif",outline:"none"}}/>;}
function InpNum({val,onChange,unit,min,max}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <input type="number" value={val} min={min} max={max} onChange={e=>onChange(parseFloat(e.target.value)||0)}

                </div>
              </div>
              <div className="fml-card">

                <div className="fml-note">

                </div>
              </div>
              <div className="fml-card">
                <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:4}}>H. 노즐선단 방수압 h₄ (m)</div>

                <div className="fml-note">NFPC 102 제6조: 방수압력 최솟값 0.17 MPa → 수두 17 m 고정 적용</div>

                <code className="fml-eq" style={{background:"#fef3c7",color:"#92400e"}}>J = (E + F + G + H) × 1.1 &nbsp;→ 올림(ceil) [m]</code>
                <div className="fml-note">
                  안전율 10% 가산: I = (E+F+G+H) × 0.1<br/>

                </div>
              </div>
            </div>
          </div>

          {/* ══ 탭: 전동기 동력 ══ */}
          <div className={`fml-panel${itab==='power'?' on':''}`}>
            <div className="fml-sec">

              <div className="fml-card" style={{border:"1.5px solid #fecaca",background:"#fef2f2"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#b91c1c",marginBottom:4}}>P. 전동기 이론 출력 (kW)</div>
                <code className="fml-eq" style={{background:"#fee2e2",color:"#7f1d1d"}}>P = 0.163 × M × J × K ÷ η &nbsp;[kW]</code>
                <div className="fml-note">
                  0.163 : 단위환산 상수 (ρ×g/60,000)<br/>
                  M : 토출량 (m³/min) = C ÷ 1,000<br/>
                  J : 전양정 (m)<br/>
                  K : 전달계수 — 전동기 직결 1.1 / 전동기 이외 원동기 1.15<br/>
                  η : 펌프 효율 — 40A=0.40, 65A=0.55, 100A=0.60, 150A=0.70
                </div>
              </div>
              <div className="fml-card">
                <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:4}}>Q. 전동기 채택 출력 (HP)</div>
                <code className="fml-eq">HP (이론) = P(kW) × 1.341 → 상위 표준 규격 선정</code>
                <div className="fml-note">표준 규격 : 3·5·7.5·10·15·20·25·30·40·50·60·75·100·125·150·200 HP</div>
              </div>
            </div>

                <code className="fml-eq">상당직관(m) = Σ [ 관부속 수량 × 해당 관경의 상당직관 환산값 ]</code>
                <div className="fml-note">
                  나사 접합 기준 상당직관 적용 (KS B 6721 준용)<br/>
                  Reducer → 45°Elbow 동일 적용 (관경 小 기준)<br/>
                  Coupling → 직류 Tee 동일 &nbsp;|&nbsp; Union/Flange/Socket → 무시 (손실 미소)<br/>
                  Alarm V/V, Foot V/V, Strainer → Angle V/V 동일
                </div>
              </div>
            </div>
          </div>

          <div style={{textAlign:"center",fontSize:10,color:"#9ca3af",paddingTop:8,borderTop:"1px solid #f1f5f9"}}>
            NFPC 102 / NFTC 102·604 · Hazen-Williams Formula · MANMIN Ver-3.3
          </div>
        </div>
      </div>
    </div>
  );
}

     transform-origin:top center 방식:
     ① outer에 display:flex + justify-content:center 로 수평 중앙 확보
     ② scale 축소 시 top center 기준으로 중앙 유지
     ③ outer.height = scrollHeight×scale 로 높이 보정
     → 인쇄 시 transform:none 으로 A4 원본 복원        */
  useEffect(()=>{

      const outer=document.getElementById('rpt-outer');

      const A4W=794;
      /* 좌우 패딩 없이 실제 사용 가능한 너비 계산 */
      const outerW=outer.clientWidth;
      const scale=Math.min(1,(outerW-24)/A4W);
      if(scale>=1){
        /* 데스크탑: 원본 크기, 중앙 정렬은 flex로 처리 */
        inner.style.cssText='width:794px;box-sizing:border-box;transform:none;transform-origin:top center;';
        outer.style.height='auto';
      }else{
        /* 모바일/태블릿: top center 기준으로 축소 → 좌우 쏠림 없음 */
        inner.style.cssText=`width:794px;box-sizing:border-box;transform-origin:top center;transform:scale(${scale});`;
        outer.style.height=(inner.scrollHeight*scale+40)+'px';
      }

                <RRow no="I" label="안전율 (SF = 10%)"                  value={f3(C.I)}              unit="m"  basis={`I = (E+F+G+H) × 0.1 = ${f3(C.E+C.F+C.G+C.H4)} × 0.1`}/>
                <RRow no="J" label="전  양  정"                         value={`${f3(C.Jraw)} → ${C.J}`} unit="m"  basis={`J = E+F+G+H+I = ${f3(C.Jraw)} m → ${C.J} m (올림 적용) — 법정기준 + 엔지니어링 안전율(10%) 가산`} hi/>
              </RSection>

              {/* ─ Ⅱ-3 전동기 ─ */}
              <RSection title="Ⅱ-3. 전동기 동력 계산">
                <RRow no="K" label="펌프의 토출측 구경"      value={sys.pumpDia}                     unit="A"       basis="설계 도면 기준"/>
                <RRow no="L" label="펌프의 전달방식"         value={TRANS_TYPE[sys.transType]?.label} unit=""        basis={`전달계수 K = ${TRANS_TYPE[sys.transType]?.k}`}/>
                <RRow no="M" label="펌프의 토출량 (Q)"       value={f3(C.M)}                          unit="m³/min"  basis={`M = C ÷ 1,000 = ${C.Clpm} ÷ 1,000`}/>
                <RRow no="N" label="펌프의 효율 (η)"         value={ff(C.N,2)}                        unit=""        basis={`${sys.pumpDia}A 구경 기준 — η = ${(C.N*100).toFixed(0)}%`}/>
                <RRow no="O" label="전달계수 (K)"            value={TRANS_TYPE[sys.transType]?.k}     unit=""        basis={`${TRANS_TYPE[sys.transType]?.label} 적용`}/>
                <RRow no="P" label="전동기 출력 (이론값)"    value={f3(C.Pkw)}                        unit="kW"      basis={`P = 0.163 × M × J × O ÷ N = 0.163 × ${f3(C.M)} × ${C.J} × ${TRANS_TYPE[sys.transType]?.k} ÷ ${C.N}`}/>
                <RRow no="Q" label="전동기 출력 (채택)"      value={C.Php}                            unit="HP"      basis={`이론: ${f3(C.Pkw)} kW = ${f3(C.Pkw*1.341)} HP → 상위 표준 규격 선정`} hi/>
              </RSection>

              {/* ─ 배관 마찰손실 명세표 ─ */}
              <div className="page-break" style={{marginBottom:20}}>
                <div style={{fontWeight:700,fontSize:11,marginBottom:7,color:"#374151",borderLeft:"3px solid #1e40af",paddingLeft:10,fontFamily:"'Noto Sans KR',sans-serif"}}>
                  ※ 배관 및 관부속 마찰손실 수두 상세표 &nbsp;[ h₂ = {f3(C.F)} m &nbsp;|&nbsp; 배관종류 : {C.pCfg.shortLabel}, C = {C.pCfg.C} ]
                </div>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,fontFamily:"'Noto Sans KR',sans-serif"}}>
                  <thead>
                    <tr style={{background:"#1e3a5f",color:"white"}}>
                      {["NO","유량\n(ℓ/min)","관경\n(A)","직관\n(m)",
                        "90°Elbow\n수량(상당직관)","45°Elbow\n수량(상당직관)","분류Tee\n수량(상당직관)","직류Tee\n수량(상당직관)",
                        "Gate V/V\n수량(상당직관)","Ball V/V\n수량(상당직관)","Angle V/V\n수량(상당직관)","Check V/V\n수량(상당직관)",
                        "상당직관\n합계(m)","마찰계수\n(m/100m)","손실수두\n(m)"].map((h,i)=>(
                        <th key={i} style={{border:BD,padding:"5px 4px",textAlign:"center",whiteSpace:"pre-line",lineHeight:1.4,fontSize:9,fontWeight:700,fontFamily:"'Noto Sans KR',sans-serif"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {segs.map((s,i)=>{
                      const d=C.sdets[i]||{fric:0,fl:0,hl:0};
                      const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
                      // [e90,e45,teeB,teeS,gate,ball,angle,check] counts
                      const counts=[s.e90,s.e45,s.teeB,s.teeS,s.gate,s.ball,s.angle,s.check];
                      return(
                        <tr key={i} style={{background:i%2===0?"white":"#f9fafb"}}>
                          <td style={{border:BD,padding:"4px 5px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:11,whiteSpace:"nowrap"}}>{i+1}</td>
                          <td style={{border:BD,padding:"4px 5px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:11,whiteSpace:"nowrap"}}>{s.flow}</td>
                          <td style={{border:BD,padding:"4px 5px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:11,whiteSpace:"nowrap"}}>{s.dia}</td>
                          <td style={{border:BD,padding:"4px 5px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:11,whiteSpace:"nowrap"}}>{s.len}</td>
                          {counts.map((cnt,j)=>(
                            <td key={j} style={{border:BD,padding:"3px 4px",textAlign:"center",fontSize:10,whiteSpace:"nowrap",lineHeight:1.4}}>
                              <div style={{fontFamily:"'Noto Sans Mono',monospace",fontWeight:700,fontSize:11}}>{cnt}</div>
                              <div style={{fontFamily:"'Noto Sans Mono',monospace",fontSize:9,color:"#6b7280"}}>({f3(eq[j])})</div>
                            </td>
                          ))}
                          <td style={{border:BD,padding:"4px 5px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:11,whiteSpace:"nowrap"}}>{f3(d.fl)}</td>
                          <td style={{border:BD,padding:"4px 5px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:11,whiteSpace:"nowrap"}}>{f3(d.fric)}</td>
                          <td style={{border:BD,padding:"4px 5px",textAlign:"center",fontFamily:"'Noto Sans Mono',monospace",fontSize:11,whiteSpace:"nowrap"}}>{f3(d.hl)}</td>
                        </tr>
                      );
                    })}
                    <tr style={{background:"#fef3c7",fontWeight:700}}>
                      <td colSpan={14} style={{border:BD,padding:"5px 10px",textAlign:"right",color:"#92400e",fontSize:11,fontFamily:"'Noto Sans KR',sans-serif",whiteSpace:"nowrap"}}>합계 (h₂)</td>
                      <td style={{border:BD,padding:"5px 6px",textAlign:"right",fontFamily:"'Noto Sans Mono',monospace",color:"#b45309",fontWeight:900,fontSize:12,paddingRight:8}}>{f3(C.F)}</td>
                    </tr>
                  </tbody>
                </table>
              </div>

              {/* ─ Ⅱ-4 펌프 선정 결과 ─ */}
              <div style={{border:"2px solid #b91c1c",borderRadius:8,overflow:"hidden",marginBottom:18}}>
                <div style={{...SEC_TITLE_STYLE,borderRadius:0}}>Ⅱ-4. 펌프 선정 결과</div>
                <div style={{background:"#fef2f2",padding:"14px 16px"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,fontFamily:"'Noto Sans KR',sans-serif"}}>
                    <thead>
                      <tr style={{background:"#b91c1c",color:"white"}}>
                        {["구분","구경(A)","유량(m³/min)","동력(HP)","양정(m)","수원(m³)","전달방식","소화전 수(N)"].map(h=>(
                          <th key={h} style={{border:BD,padding:"7px 10px",textAlign:"center",fontWeight:700,whiteSpace:"nowrap",fontFamily:"'Noto Sans KR',sans-serif"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      <tr style={{fontWeight:700,background:"white"}}>
                        {["주  펌  프",`${sys.pumpDia}×${sys.pumpDia}`,f3(C.M),C.Php,C.J,f3(C.D),TRANS_TYPE[sys.transType]?.label,`${C.A} 개`].map((v,i)=>(
                          <td key={i} style={{border:BD,padding:"7px 10px",textAlign:"center",fontFamily:"'Noto Sans Mono','Noto Sans KR',monospace",fontSize:12,whiteSpace:"nowrap"}}>{v}</td>
                        ))}
                      </tr>
                    </tbody>
                  </table>
                  <div style={{textAlign:"center",marginTop:12,fontSize:16,fontWeight:900,color:"#b91c1c",letterSpacing:"0.04em",borderTop:"1px solid #fca5a5",paddingTop:12,fontFamily:"'Noto Sans Mono','Noto Sans KR',monospace"}}>
                    Q = {f3(C.M)} ㎥/min &nbsp;×&nbsp; H = {C.J} m &nbsp;×&nbsp; P = {C.Php} HP
                  </div>
                </div>
              </div>

              {/* ─ 적용 법령 ─ */}
              <div style={{padding:13,background:"#f8fafc",borderRadius:8,fontSize:11,color:"#6b7280",border:BD,fontFamily:"'Noto Sans KR',sans-serif",lineHeight:1.9}}>
                <b style={{color:"#374151"}}>▣ 적용 법령 및 기준</b><br/>
                ① 화재안전기준 NFPC 102 (옥내소화전설비의 화재안전기준)<br/>
                ② 화재안전기술기준 NFTC 102 (2022.12.01. 시행)<br/>
                &nbsp;&nbsp;- 제5조 (수원): 소화전 N개 × 2.6 m³ 이상 (최대 5개, 최대 13 m³)<br/>
                &nbsp;&nbsp;- 제6조 (가압송수장치): 방수압 0.17~0.7 MPa, 방수량 130 ℓ/min 이상<br/>
                ③ 배관 마찰손실: Hazen-Williams 공식 — {C.pCfg.shortLabel}, C = {C.pCfg.C} 적용
                {["STS","CPVC"].includes(sys.pipeType)&&" (내식성 배관 — C=150 적용)"}
              </div>

              {/* ─ Developer 바닥글 (문서 흐름 최하단 우측, 인쇄 시 fixed footer) ─ */}
              <div id="dev-stamp" style={{fontFamily:"'Orbitron',sans-serif",fontWeight:700,letterSpacing:"0.08em"}}>MANMIN · Ver-3.3</div>

            </div>{/* /report-zone */}
            </div>{/* /rpt-inner */}
            </div>{/* /rpt-outer */}
          </div>
        )}

      </div>
    </div>

    {/* ═══ 계산식 안내 FAB 버튼 ═══ */}
    <button className="formula-fab no-print" style={{bottom:102}} onClick={()=>setShowFormula(true)}>
      <span style={{fontSize:20,lineHeight:1}}>📐</span>
      <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.04em"}}>계산식</span>
      <span style={{fontSize:9,opacity:0.8}}>안내</span>
    </button>

    {/* ═══ PWA 설치 FAB ═══ */}
    {deferredPrompt&&(
      <button className="pwa-install-fab no-print" onClick={handleInstall} aria-label="앱 설치 바로가기">
        <div className="pwa-install-fab-badge">NEW</div>
        <span style={{fontSize:20,lineHeight:1}}>📲</span>
        <span style={{fontSize:10,fontWeight:800,letterSpacing:"0.04em"}}>앱 설치</span>
        <span style={{fontSize:9,opacity:0.8}}>바로가기</span>
      </button>
    )}

    {/* ═══ 계산식 안내 모달 ═══ */}
    {showFormula&&<FormulaModal onClose={()=>setShowFormula(false)}/>}

    {/* ═══ PWA 설치 배너 ═══ */}
    {showInstallBanner && (
      <div style={{position:"fixed",bottom:16,left:16,right:16,zIndex:9999}} className="pwa-install-banner" 
           onClick={e=>e.stopPropagation()}>
        <div style={{borderRadius:16,padding:16,display:"flex",alignItems:"center",gap:12}}>
          <img src="icons/icon-192.png" style={{width:48,height:48,borderRadius:12,flexShrink:0,boxShadow:"0 4px 12px rgba(0,0,0,0.3)"}} alt="옥내소화전 앱 아이콘"/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:"white",fontSize:13,fontWeight:800}}>홈 화면에 설치하시겠습니까?</div>
            <div style={{color:"#fca5a5",fontSize:10,fontWeight:600,marginTop:4}}>오프라인에서도 사용 가능합니다</div>
          </div>
          <div style={{display:"flex",gap:8,flexShrink:0}}>
            <button onClick={()=>setShowInstallBanner(false)} style={{color:"rgba(255,255,255,0.6)",fontSize:11,fontWeight:700,padding:"8px 12px",border:"none",background:"transparent",cursor:"pointer",borderRadius:8}}>닫기</button>
            <button onClick={handleInstall} style={{background:"white",color:"#DC2626",fontSize:11,fontWeight:900,padding:"8px 16px",border:"none",borderRadius:8,cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.2)"}}>설치</button>
          </div>
        </div>
      </div>
    )}

    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<!-- ═══ Service Worker Ver 3.3 — 재설치 문제 원천 차단 ═══ -->
<script>
(function(){
  'use strict';
  if(!('serviceWorker' in navigator)) return;

  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js', {updateViaCache:'none'})
      .then(function(reg){
        console.log('[PWA v3.2] SW 등록 — scope:', reg.scope);

        /* ★ 핵심: 대기 중인 SW가 있으면 즉시 skipWaiting 적용
           재설치 후 이전 SW가 waiting 상태로 남아 있을 때 처리 */
        if(reg.waiting) {
          console.log('[PWA v3.2] waiting SW 감지 → skipWaiting 즉시 적용');
          reg.waiting.postMessage({type:'SKIP_WAITING'});
        }

        /* 새 SW 발견 시 업데이트 배너 표시 */
        reg.addEventListener('updatefound', function(){
          var nw = reg.installing;
          if(!nw) return;
          nw.addEventListener('statechange', function(){
            if(nw.state === 'installed' && navigator.serviceWorker.controller){
              _showUpdateBanner(nw);
            }
          });
        });

        /* 1시간마다 업데이트 체크 */
        setInterval(function(){ reg.update(); }, 60 * 60 * 1000);
      })
      .catch(function(e){ console.warn('[PWA v3.2] SW 등록 실패:', e); });

    /* controllerchange → 자동 새로고침 */
    var _ref = false;
    navigator.serviceWorker.addEventListener('controllerchange', function(){
      if(!_ref){ _ref = true; location.reload(); }
    });

    /* SW로부터 CACHE_CLEARED 메시지 수신 시 페이지 새로고침 */
    navigator.serviceWorker.addEventListener('message', function(event){
      if(event.data && event.data.type === 'CACHE_CLEARED'){
        console.log('[PWA v3.2] 캐시 초기화 완료 → 새로고침');
        location.reload();
      }
    });
  });

  /* 앱 설치 완료 이벤트 — FAB/헤더 버튼 숨김 */
  window.addEventListener('appinstalled', function(){
    console.log('[PWA v3.2] 설치 완료');
    var btn = document.getElementById('pwa-hdr-btn');
    if(btn) btn.classList.remove('visible');
    /* ★ 설치 완료 시 sessionStorage에 기록 → 재방문 시 배너 재표시 방지 */
    sessionStorage.setItem('pwa-installed', '1');
  });

  /* standalone 모드로 실행 중이면 설치 버튼 숨김 */
  if(window.matchMedia('(display-mode:standalone)').matches || window.navigator.standalone === true){
    document.addEventListener('DOMContentLoaded', function(){
      var btn = document.getElementById('pwa-hdr-btn');
      if(btn) btn.style.display = 'none';
    });
  }

  /* ── 업데이트 배너 ── */
  function _showUpdateBanner(worker) {
    if(document.getElementById('sw-update-banner')) return;
    var b = document.createElement('div');
    b.id = 'sw-update-banner';
    b.style.cssText = [
      'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99999',
      'background:#DC2626;color:white;border-radius:14px;padding:12px 18px',
      'display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.45)',
      'font-family:"Noto Sans KR",sans-serif;font-size:13px;white-space:nowrap',
      'animation:slideUp .35s ease-out',
      'border:1px solid rgba(255,255,255,.2)',
    ].join(';');
    b.innerHTML =
      '<span>🔄 새 버전 (v3.2) 이 있습니다</span>' +
      '<button onclick="(function(){' +
        'document.getElementById(\'sw-update-banner\').remove();' +
        'navigator.serviceWorker.ready.then(function(r){' +
          'if(r.waiting) r.waiting.postMessage({type:\'SKIP_WAITING\'});' +
        '});' +
      '})()" style="background:white;color:#DC2626;border:none;border-radius:8px;' +
        'padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;">업데이트</button>' +
      '<button onclick="document.getElementById(\'sw-update-banner\').remove()" ' +
        'style="background:rgba(255,255,255,.15);color:white;border:none;border-radius:8px;' +
        'padding:6px 10px;font-size:11px;cursor:pointer;">나중에</button>';
    document.body.appendChild(b);
  }

  /* ── 긴급 캐시 초기화 함수 (콘솔에서 호출 가능: clearPwaCache()) ── */
  window.clearPwaCache = function(){
    if(!navigator.serviceWorker.controller){
      console.warn('[PWA v3.2] 활성 SW 없음');
      return;
    }
    navigator.serviceWorker.controller.postMessage({type:'CLEAR_CACHE'});
    console.log('[PWA v3.2] CLEAR_CACHE 전송 — 캐시 초기화 중...');
  };
})();
</script>
</body>
</html>
