<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>오프라인 — 옥내소화전</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#450a0a,#991b1b,#b91c1c);
  display:flex;align-items:center;justify-content:center;
  font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
  color:#fff;padding:24px;
}
.box{
  max-width:380px;width:100%;text-align:center;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);
  border-radius:20px;padding:48px 32px;
  box-shadow:0 8px 40px rgba(0,0,0,.3);
  backdrop-filter:blur(12px);
}
.ico-wrap{
  width:72px;height:72px;margin:0 auto 24px;
  background:rgba(255,255,255,.15);border-radius:16px;
  display:flex;align-items:center;justify-content:center;font-size:38px;
}
h1{font-size:1.25rem;font-weight:900;color:#fff;margin-bottom:8px;}
p{font-size:.85rem;color:rgba(255,255,255,.75);line-height:1.75;margin-bottom:28px;}
button{
  background:#fff;color:#b91c1c;border:none;
  padding:12px 32px;border-radius:9px;
  font-size:.88rem;font-weight:900;cursor:pointer;
  font-family:inherit;transition:opacity .15s;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
button:hover{opacity:.9;}
.foot{margin-top:20px;font-size:.7rem;color:rgba(255,255,255,.4);
  font-family:'Courier New',monospace;}
</style>
</head>
<body>
<div class="box">
  <div class="ico-wrap">🚒</div>
  <h1>오프라인 상태입니다</h1>
  <p>인터넷 연결을 확인해 주세요.<br>연결 후 다시 시도하면<br>캐시 데이터로 자동 복원됩니다.</p>
  <button onclick="location.reload()">🔄 다시 시도</button>
  <div class="foot">옥내소화전 펌프 용량 계산서 — MANMIN-Ver3.0</div>
</div>
</body>
</html>
